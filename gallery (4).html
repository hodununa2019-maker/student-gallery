<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1인가구 시각화 갤러리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #07090f;
    --surface: #0d1120;
    --border:  rgba(255,255,255,0.07);
    --accent:  #4f8eff;
    --accent2: #a78bfa;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --tag-bg:  rgba(79,142,255,0.12);
    --danger:  #f87171;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  /* HEADER */
  header {
    flex-shrink: 0;
    background: rgba(7,9,15,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 56px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.15em;
    background: var(--tag-bg); border: 1px solid rgba(79,142,255,0.3);
    border-radius: 4px; padding: 3px 8px;
  }
  .logo-title { font-size: 14px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .header-count span { color: var(--accent2); }

  /* ADD BUTTON in header */
  .btn-add {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none; border-radius: 7px;
    padding: 7px 14px; cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }
  .btn-add-icon { font-size: 15px; line-height: 1; }

  /* BODY */
  .body-wrap { display: flex; flex: 1; min-height: 0; }

  /* SIDEBAR */
  .sidebar {
    width: 280px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; padding: 14px 10px 80px;
    gap: 5px;
  }
  .section-label {
    font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
    color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase;
    padding: 0 8px; margin: 4px 0 6px;
  }

  /* NAV CARD */
  .nav-btn {
    width: 100%; text-align: left; cursor: pointer;
    background: transparent; border: 1px solid transparent;
    border-radius: 9px; padding: 11px 13px;
    transition: all 0.15s; color: inherit;
    position: relative;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }
  .nav-btn.active { background: rgba(79,142,255,0.1); border-color: rgba(79,142,255,0.35); }
  .nav-btn:hover .btn-delete { opacity: 1; }

  .btn-delete {
    position: absolute; top: 8px; right: 8px;
    width: 22px; height: 22px; border-radius: 5px;
    background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.25);
    color: var(--danger); font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: all 0.15s;
    line-height: 1;
  }
  .btn-delete:hover { background: rgba(248,113,113,0.3); }

  .nb-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .nb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .nav-btn.active .nb-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .nb-num { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); }
  .nav-btn.active .nb-num { color: var(--accent); }
  .nb-title { font-size: 12px; font-weight: 700; line-height: 1.4; margin-bottom: 2px; padding-right: 20px; }
  .nb-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .nb-file { margin-top: 6px; font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(79,142,255,0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-btn.active .nb-file { color: rgba(79,142,255,0.7); }

  /* SIDEBAR DROP ZONE */
  .sidebar-drop {
    margin: 6px 2px 0;
    border: 1.5px dashed rgba(79,142,255,0.25);
    border-radius: 10px; padding: 14px 12px;
    text-align: center; cursor: pointer;
    transition: all 0.2s; color: var(--muted);
    font-size: 12px; line-height: 1.6;
  }
  .sidebar-drop:hover, .sidebar-drop.drag-over {
    border-color: var(--accent);
    background: rgba(79,142,255,0.07);
    color: var(--text);
  }
  .sidebar-drop-icon { font-size: 22px; margin-bottom: 5px; }

  /* PREVIEW */
  .preview-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  .toolbar {
    flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .toolbar-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .t-badge {
    font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
    color: var(--accent); background: var(--tag-bg);
    border: 1px solid rgba(79,142,255,0.3); border-radius: 4px; padding: 3px 7px; flex-shrink: 0;
  }
  .t-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .t-actions { display: flex; gap: 7px; flex-shrink: 0; }
  .t-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500; cursor: pointer;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 11px; color: var(--muted);
    transition: all 0.15s; white-space: nowrap;
  }
  .t-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); }
  .t-btn.primary { background: rgba(79,142,255,0.15); border-color: rgba(79,142,255,0.4); color: var(--accent); }
  .t-btn.primary:hover { background: rgba(79,142,255,0.25); }

  .frame-wrap { flex: 1; position: relative; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; display: block; }

  .loading-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    background: var(--bg); transition: opacity 0.3s; pointer-events: none;
  }
  .loading-overlay.hidden { opacity: 0; }
  .spinner {
    width: 32px; height: 32px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  /* EMPTY */
  .empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; color: var(--muted);
  }
  .empty-icon { font-size: 48px; opacity: 0.35; }
  .empty-ttl { font-size: 15px; font-weight: 700; color: var(--text); }
  .empty-sub { font-size: 13px; }

  /* FULL DROP OVERLAY */
  .drop-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(7,9,15,0.85); backdrop-filter: blur(6px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    pointer-events: none; opacity: 0; transition: opacity 0.2s;
  }
  .drop-overlay.visible { opacity: 1; pointer-events: all; }
  .drop-box {
    border: 2px dashed var(--accent);
    border-radius: 20px; padding: 48px 64px;
    text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .drop-box-icon { font-size: 52px; }
  .drop-box-title { font-size: 20px; font-weight: 700; }
  .drop-box-sub { font-size: 13px; color: var(--muted); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    opacity: 0; transition: all 0.25s; pointer-events: none;
    white-space: nowrap; z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(79,142,255,0.4); color: var(--accent); }
  .toast.error   { border-color: rgba(248,113,113,0.4); color: var(--danger); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>

<!-- 전체 드래그 오버레이 -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-box">

</div>

<div class="toast" id="toast"></div>

<header>

  </div>

<div class="body-wrap">

  <div class="preview-area">

      <div class="empty-sub">목록에서 파일을 클릭하거나 새 HTML을 추가하세요</div>
    </div>

    <div id="previewWrapper" style="display:none;flex-direction:column;height:100%;">
      <div class="toolbar">
        <div class="toolbar-info">
          <span class="t-badge" id="tNum"></span>
          <span class="t-title" id="tTitle"></span>
        </div>
        <div class="t-actions">
          <button class="t-btn primary" onclick="openNewTab()">↗ 새 탭에서 열기</button>
          <button class="t-btn" onclick="downloadCurrent()">⬇ 다운로드</button>

      </div>
      <div class="frame-wrap">
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-text">불러오는 중...</div>
        </div>
        <iframe id="previewFrame" title="미리보기"></iframe>
      </div>
    </div>
  </div>
</div>

    html: "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>\ud55c\uad6d \uc2dc\uad70\uad6c\ubcc4 1\uc778\uac00\uad6c \ubc84\ube14\uc9c0\ub3c4</title>\n<link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css\"/>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js\"><\/script>\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body { font-family: 'Malgun Gothic', '\ub9d1\uc740 \uace0\ub515', sans-serif; background: #0f1117; color: #e0e0e0; }\n  \n  #header {\n    background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%);\n    padding: 16px 24px;\n    border-bottom: 1px solid #2a2d3e;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    z-index: 1000;\n    position: relative;\n  }\n  #header h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }\n  #header p { font-size: 12px; color: #8899aa; margin-top: 3px; }\n  #subtitle { font-size: 11px; color: #667; }\n\n  #map { height: calc(100vh - 62px); width: 100%; }\n\n  .legend {\n    background: rgba(15, 17, 30, 0.92);\n    border: 1px solid #2a2d3e;\n    border-radius: 10px;\n    padding: 14px 16px;\n    font-size: 12px;\n    color: #ccc;\n    backdrop-filter: blur(8px);\n    min-width: 210px;\n  }\n  .legend h4 {\n    font-size: 13px;\n    font-weight: 700;\n    margin-bottom: 10px;\n    color: #fff;\n    border-bottom: 1px solid #2a2d3e;\n    padding-bottom: 7px;\n  }\n  .legend-section { margin-bottom: 12px; }\n  .legend-section .label { font-size: 11px; color: #889; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.3px; }\n  .color-bar {\n    height: 14px;\n    border-radius: 7px;\n    background: linear-gradient(to right, #3b4fd0, #7799ff, #aabbcc, #ff9966, #e64040);\n    margin-bottom: 4px;\n  }\n  .color-labels { display: flex; justify-content: space- 052, \"young_ratio\": 38.5, \"old_ratio\": 18.7, \"diff\": 19.8, \"order\": 248, \"lat\": 35.2151, \"lng\": 128.6822}, {\"region\": \"\ub9c8\uc0b0\ud569\ud3ec\uad6c\", \"total\": 30202, \"young\": 6925, \"old\": 11919, \"young_ratio\": 22.9, \"old_ratio\": 39.5, \"diff\": -16.6, \"order\": 249, \"lat\": 35.1956, \"lng\": 128.5676}, {\"region\": \"\ub9c8\uc0b0\ud68c\uc6d0\uad6c\", \"total\": 26291, \"young\": 4692, \"old\": 10484, \"young_ratio\": 17.8, \"old_ratio\": 39.9, \"diff\": -22.1, \"order\": 250, \"lat\": 35.2185, \"lng\": 128.5812}, {\"region\": \"\uc9c4\ud574\uad6c\", \"total\": 27922, \"young\": 7115, \"old\": 8414, \"young_ratio\": 25.5, \"old_ratio\": 30.1, \"diff\": -4.6, \"order\": 251, \"lat\": 35.1535, \"lng\": 128.6933}];\n\nconst map = L.map('map', {\n  center: [36.5, 127.8],\n  zoom: 7,\n  zoomControl: true,\n  preferCanvas: true\n});\n\nL.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png', {\n  attribution: '&copy; <a href=\"https://www.openstreetmap.org/copyright\">OpenStreetMap</a> &copy; <a href=\"https://carto.com/attributions\">CARTO</a>',\n  subdomains: 'abcd',\n  maxZoom: 19\n}).addTo(map);\n\n// Color scale: blue (youth dominant) \u2192 grey (neutral) \u2192 red (elder dominant)\nfunction getColor(diff) {\n  if (diff > 40) return '#3b4fd0';\n  if (diff > 25) return '#5577ee';\n  if (diff > 10) return '#7799ff';\n  if (diff > 0)  return '#99aacc';\n  if (diff > -10) return '#ccbbaa';\n  if (diff > -25) return '#ff9966';\n  if (diff > -40) return '#e85030';\n  return '#c82020';\n}\n\nfunction getOpacity(diff) {\n  const absDiff = Math.abs(diff);\n  return 0.55 + Math.min(absDiff / 60, 1) * 0.35;\n}\n\n// Radius scaling by total (sqrt scale)\nconst maxTotal = Math.max(...regionData.map(d => d.total));\nconst minTotal = Math.min(...regionData.map(d => d.total));\n\nfunction getRadius(total) {\n  const normalized = Math.sqrt((total - minTotal) / (maxTotal - minTotal));\n  return 5 + normalized * 35;\n}\n\nfunction formatNum(n) {\n  return n.toLocaleString('ko-KR');\n}\n\nfunction getDiffLabel(diff) {\n  if (diff > 0) return `\uccad\ub144 +${diff.toFixed(1)}%p \uc6b0\uc138`;\n  if (diff < 0) return `\ub178\ub144 +${Math.abs(diff).toFixed(1)}%p \uc6b0\uc138`;\n  return '\uade0\ud615';\n}\n\nfunction getDiffColor(diff) {\n  if (diff > 15) return '#7799ff';\n  if (diff > 0) return '#99aacc';\n  if (diff < -15) return '#e85030';\n  if (diff < 0) return '#ff9966';\n  return '#aabbaa';\n}\n\nlet circles = [];\nlet currentFilter = 'all';\n\nfunction createCircles(data) {\n  circles.forEach(c => map.removeLayer(c));\n  circles = [];\n\n  // Sort by total so bigger circles are drawn first (underneath)\n  const sorted = [...data].sort((a, b) => b.total - a.total);\n\n  sorted.forEach(d => {\n    const color = getColor(d.diff);\n    const radius = getRadius(d.total);\n    const opacity = getOpacity(d.diff);\n\n    const circle = L.circleMarker([d.lat, d.lng], {\n      radius: radius,\n      fillColor: color,\n      color: 'rgba(255,255,255,0.15)',\n      weight: 1,\n      fillOpacity: opacity\n    });\n\n    const youngBar = `<div class=\"popup-bar\"><div class=\"popup-bar-fill\" style=\"width:${d.young_ratio}%;background:linear-gradient(to right,#4466cc,#7799ff)\"></div></div>`;\n    const oldBar = `<div class=\"popup-bar\"><div class=\"popup-bar-fill\" style=\"width:${d.old_ratio}%;background:linear-gradient(to right,#cc5533,#e85030)\"></div></div>`;\n    const diffColor = getDiffColor(d.diff);\n    const diffLabel = getDiffLabel(d.diff);\n\n    const popupHtml = `\n      <div class=\"popup-box\">\n        <div class=\"popup-title\">${d.region}</div>\n        <div class=\"popup-grid\">\n          <div class=\"popup-stat\">\n            <div class=\"ps-label\">1\uc778\uac00\uad6c \ucd1d\uc218</div>\n            <div class=\"ps-val\">${formatNum(d.total)}<span>\uac00\uad6c</span></div>\n          </div>\n          <div class=\"popup-stat\">\n            <div class=\"ps-label\">\uccad\uc7a5\ub144\u00b7\ub178\ub144 \ucc28\uc774</div>\n            <div class=\"ps-val\" style=\"color:${diffColor}\">${d.diff > 0 ? '+' : ''}${d.diff.toFixed(1)}<span>%p</span></div>\n          </div>\n        </div>\n        <div class=\"popup-bar-wrap\">\n          <div class=\"popup-bar-label\">\n            <span>\ud83d\udd35 \uccad\ub144(20~39\uc138)</span>\n            <span style=\"color:#7799ff;font-weight:700\">${d.young_ratio}%</span>\n          </div>\n          ${youngBar}\n        </div>\n        <div class=\"popup-bar-wrap\" style=\"margin-top:6px\">\n          <div class=\"popup-bar-label\">\n            <span>\ud83d\udd34 \ub178\ub144(65\uc138+)</span>\n            <span style=\"color:#e85030;font-weight:700\">${d.old_ratio}%</span>\n          </div>\n          ${oldBar}\n        </div>\n        <div class=\"popup-diff\" style=\"background:${diffColor}22;color:${diffColor};border:1px solid ${diffColor}44\">\n          ${diffLabel}\n        </div>\n      </div>`;\n\n    circle.bindPopup(popupHtml, { maxWidth: 280, className: 'custom-popup' });\n    circle.addTo(map);\n    circles.push(circle);\n  });\n}\n\nfunction filterMap(type) {\n  currentFilter = type;\n  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));\n  document.getElementById('btn-' + type).classList.add('active');\n\n  let filtered;\n  if (type === 'youth') filtered = regionData.filter(d => d.diff > 10);\n  else if (type === 'elder') filtered = regionData.filter(d => d.diff < -10);\n  else filtered = regionData;\n\n  createCircles(filtered);\n}\n\n// Initial render\ncreateCircles(regionData);\n\n// Legend\nconst legend = L.control({ position: 'bottomleft' });\nlegend.onAdd = function() {\n  const div = L.DomUtil.create('div', 'legend');\n  div.innerHTML = `\n    <h4>\ud83d\udcca \uc0c9\uc0c1 \u00b7 \ud06c\uae30 \ubc94\ub840</h4>\n    <div class=\"legend-section\">\n      <div class=\"label\">\uc6d0 \uc0c9\uc0c1 \u2014 \uccad\uc7a5\ub144\u00b7\ub178\ub144 \ube44\uc72  \"elderly_pct\": 20.9, \"diff\": 24.3, \"lat\": 37.2812, \"lng\": 127.0161}, {\"region\": \"\ud3c9\ucc3d\uad70\", \"total\": 8185, \"youth\": 902, \"elderly\": 3775, \"youth_pct\": 11.0, \"elderly_pct\": 46.1, \"diff\": -35.1, \"lat\": 37.3703, \"lng\": 128.3882}, {\"region\": \"\ud3c9\ud0dd\uc2dc\", \"total\": 97089, \"youth\": 39961, \"elderly\": 17752, \"youth_pct\": 41.2, \"elderly_pct\": 18.3, \"diff\": 22.9, \"lat\": 37.0, \"lng\": 126.9999}, {\"region\": \"\ud3ec\ucc9c\uc2dc\", \"total\": 22914, \"youth\": 4843, \"elderly\": 7997, \"youth_pct\": 21.1, \"elderly_pct\": 34.9, \"diff\": -13.8, \"lat\": 37.8954, \"lng\": 127.2002}, {\"region\": \"\ud3ec\ud56d\uc2dc\", \"total\": 77434, \"youth\": 20162, \"elderly\": 26495, \"youth_pct\": 26.0, \"elderly_pct\": 34.2, \"diff\": -8.2, \"lat\": 36.019, \"lng\": 129.3435}, {\"region\": \"\ud558\ub0a8\uc2dc\", \"total\": 40621, \"youth\": 16282, \"elderly\": 9027, \"youth_pct\": 40.1, \"elderly_pct\": 22.2, \"diff\": 17.9, \"lat\": 37.5397, \"lng\": 127.2148}, {\"region\": \"\ud558\ub3d9\uad70\", \"total\": 7998, \"youth\": 567, \"elderly\": 4525, \"youth_pct\": 7.1, \"elderly_pct\": 56.6, \"diff\": -49.5, \"lat\": 35.0671, \"lng\": 127.7516}, {\"region\": \"\ud568\uc548\uad70\", \"total\": 9882, \"youth\": 943, \"elderly\": 5091, \"youth_pct\": 9.5, \"elderly_pct\": 51.5, \"diff\": -42.0, \"lat\": 35.2726, \"lng\": 128.4068}, {\"region\": \"\ud568\uc591\uad70\", \"total\": 7316, \"youth\": 627, \"elderly\": 4225, \"youth_pct\": 8.6, \"elderly_pct\": 57.8, \"diff\": -49.2, \"lat\": 35.5204, \"lng\": 127.7256}, {\"region\": \"\ud568\ud3c9\uad70\", \"total\": 5688, \"youth\": 401, \"elderly\": 3453, \"youth_pct\": 7.0, \"elderly_pct\": 60.7, \"diff\": -53.7, \"lat\": 35.0655, \"lng\": 126.5168}, {\"region\": \"\ud569\ucc9c\uad70\", \"total\": 9136, \"youth\": 584, \"elderly\": 5749, \"youth_pct\": 6.4, \"elderly_pct\": 62.9, \"diff\": -56.5, \"lat\": 35.5662, \"lng\": 128.1666}, {\"region\": \"\ud574\ub0a8\uad70\", \"total\": 11640, \"youth\": 1150, \"elderly\": 6616, \"youth_pct\": 9.9, \"elderly_pct\": 56.8, \"diff\": -46.9, \"lat\": 34.5737, \"lng\": 126.5992}, {\"region\": \"\ud574\uc6b4\ub300\uad6c\", \"total\": 51816, \"youth\": 12733, \"elderly\": 19223, \"youth_pct\": 24.6, \"elderly_pct\": 37.1, \"diff\": -12.5, \"lat\": 35.1631, \"lng\": 129.1635}, {\"region\": \"\ud64d\uc131\uad70\", \"total\": 17415, \"youth\": 4548, \"elderly\": 6569, \"youth_pct\": 26.1, \"elderly_pct\": 37.7, \"diff\": -11.6, \"lat\": 36.6011, \"lng\": 126.6603}, {\"region\": \"\ud64d\ucc9c\uad70\", \"total\": 12151, \"youth\": 1846, \"elderly\": 5634, \"youth_pct\": 15.2, \"elderly_pct\": 46.4, \"diff\": -31.2, \"lat\": 37.6974, \"lng\": 127.8881}, {\"region\": \"\ud654\uc131\uc2dc\", \"total\": 124878, \"youth\": 58706, \"elderly\": 19382, \"youth_pct\": 47.0, \"elderly_pct\": 15.5, \"diff\": 31.5, \"lat\": 37.1998, \"lng\": 126.8316}, {\"region\": \"\ud654\uc21c\uad70\", \"total\": 10216, \"youth\": 1248, \"elderly\": 5398, \"youth_pct\": 12.2, \"elderly_pct\": 52.8, \"diff\": -40.6, \"lat\": 35.0642, \"lng\": 126.9868}, {\"region\": \"\ud654\ucc9c\uad70\", \"total\": 4147, \"youth\": 1030, \"elderly\": 1699, \"youth_pct\": 24.8, \"elderly_pct\": 41.0, \"diff\": -16.2, \"lat\": 38.1066, \"lng\": 127.7082}, {\"region\": \"\ud6a1\uc131\uad70\", \"total\": 8105, \"youth\": 791, \"elderly\": 3907, \"youth_pct\": 9.8, \"elderly_pct\": 48.2, \"diff\": -38.4, \"lat\": 37.4918, \"lng\": 127.984}, {\"region\": \"\ud765\ub355\uad6c\", \"total\": 51891, \"youth\": 24426, \"elderly\": 8580, \"youth_pct\": 47.1, \"elderly_pct\": 16.5, \"diff\": 30.6, \"lat\": 36.636, \"lng\": 127.4226}];\n\n// Filter out aggregate rows (\ub3d9\ubd80, \uba74\ubd80, \uc74d\ubd80, \ub0a8\uad6c, \ubd81\uad6c \ub4f1 \uc911\ubcf5/\uc9d1\uacc4)\nconst EXCLUDE = new Set([\"\ub3d9\ubd80\", \"\uba74\ubd80\", \"\uc74d\ubd80\", \"\ub0a8\uad6c\", \"\ubd81\uad6c\", \"\ub3d9\uad6c\", \"\uc11c\uad6c\", \"\uc911\uad6c\"]);\nconst rawData = DATA.filter(d => !EXCLUDE.has(d.region));\n\n// Initialize map\nconst map = L.map('map', {\n  center: [36.5, 127.8],\n  zoom: 7,\n  zoomControl: true,\n  preferCanvas: true\n});\n\n// Dark tile layer\nL.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {\n  attribution: '&copy; <a href=\"https://carto.com/\">CARTO</a> | \ucd9c\ucc98: \ud1b5\uacc4\uccad \uc778\uad6c\ucd1d\uc870\uc0ac 2024',\n  subdomains: 'abcd', maxZoom: 19\n}).addTo(map);\n\n// Color scale\nfunction diffToColor(diff) {\n  // diff: -60 to +55, center at 0\n  // negative = elderly (red/blue), positive = youth (blue tones)\n  const stops = [\n    [-58, [21,  101, 192]],  // deep blue\n    [-30, [66,  165, 245]],  // light blue\n    [0,   [200, 200, 210]],  // neutral gray\n    [30,  [239, 154, 154]],  // light red\n    [55,  [183, 28,  28]]    // deep red\n  ];\n  // Clamp\n  if (diff <= stops[0][0]) return `rgb(${stops[0][1].join(',')})`;\n  if (diff >= stops[stops.length-1][0]) return `rgb(${stops[stops.length-1][1].join(',')})`;\n  for (let i = 0; i < stops.length - 1; i++) {\n    if (diff >= stops[i][0] && diff <= stops[i+1][0]) {\n      const t = (diff - stops[i][0]) / (stops[i+1][0] - stops[i][0]);\n      const c = stops[i][1].map((v,j) => Math.round(v + t * (stops[i+1][1][j] - v)));\n      return `rgb(${c.join(',')})`;\n    }\n  }\n}\n\n// Radius scale (sqrt area proportional)\nconst maxTotal = Math.max(...rawData.map(d => d.total));\nfunction getRadius(total) {\n  return Math.max(3, Math.sqrt(total / maxTotal) * 28);\n}\n\n// Marker layer group\nlet markers = [];\nlet currentFilter = 'all';\n\nfunction createMarkers(data) {\n  markers.forEach(m => map.removeLayer(m));\n  markers = [];\n\n  data.forEach(d => {\n    const color = diffToColor(d.diff);\n    const r = getRadius(d.total);\n    const circle = L.circleMarker([d.lat, d.lng], {\n      radius: r,\n      fillColor: color,\n      color: 'rgba(255,255,255,0.25)',\n      weight: 1,\n      fillOpacity: 0.82\n    });\n\n    const diffStr = d.diff >= 0 ? `+${d.diff}` : `${d.diff}`;\n    const diffClass = d.diff >= 0 ? 'diff-pos' : 'diff-neg';\n    const youthBar = Math.min(100, d.youth_pct);\n    const elderlyBar = Math.min(100, d.elderly_pct);\n\n    circle.bindPopup(`\n      <div class=\"popup-title\">\ud83d\udccd ${d.region}</div>\n      <div class=\"popup-grid\">\n        <div class=\"popup-item\">\n          <div class=\"label\">1\uc778 \uac00\uad6c \ucd1d\uc218</div>\n          <div class=\"value total\">${d.total.toLocaleString()}\uac00\uad6c</div>\n        </div>\n        <div class=\"popup-item\">\n          <div class=\"label\">\uccad\ub144-\ub178\ub144 \uaca9\ucc28</div>\n          <div class=\"value ${diffClass}\">${diffStr}%p</div>\n        </div>\n        <div class=\"popup-item\">\n          <div class=\"label\">\uccad\ub144 (20~39\uc138)</div>\n          <div class=\"value youth\">${d.youth.toLocaleString()}\uac00\uad6c (${d.youth_pct}%)</div>\n        </div>\n        <div class=\"popup-item\">\n          <div class=\"label\">\ub178\ub144 (65\uc138 \uc774\uc0c1)</div>\n          <div class=\"value elderly\">${d.elderly.toLocaleString()}\uac00\uad6c (${d.elderly_pct}%)</div>\n        </div>\n      </div>\n      <div class=\"popup-bar\">\n        <div style=\"font-size:10px;color:#8892a4;margin-bottom:4px\">\uccad\ub144 \ube44\uc728</div>\n        <div class=\"bar-track\"><div class=\"bar-fill-youth\" style=\"width:${youthBar}%\"></div></div>\n        <div style=\"font-size:10px;color:#8892a4;margin:6px 0 4px\">\ub178\ub144 \ube44\uc728</div>\n        <div class=\"bar-track\"><div class=\"bar-fill-elderly\" style=\"width:${elderlyBar}%\"></div></div>\n      </div>\n    `, { maxWidth: 300 });\n\n    circle.on('mouseover', function() {\n      this.setStyle({ weight: 2, color: 'rgba(255,255,255,0.8)', fillOpacity: 0.95 });\n    });\n    circle.on('mouseout', function() {\n      this.setStyle({ weight: 1, color: 'rgba(255,255,255,0.25)', fillOpacity: 0.82 });\n    });\n\n    circle.addTo(map);\n    markers.push(circle);\n  });\n}\n\nfunction setFilter(type) {\n  currentFilter = type;\n  document.querySelectorAll('.filter-btn').forEach(b => {\n    b.classList.remove('active');\n    b.classList.remove('elderly');\n    b.classList.remove('all');\n  });\n  const btn = event.target;\n  btn.classList.add('active');\n  if (type === 'elderly') btn.classList.add('elderly');\n  if (type === 'all') btn.classList.add('all');\n\n  let filtered;\n  if (type === 'youth') filtered = rawData.filter(d => d.diff > 0);\n  else if (type === 'elderly') filtered = rawData.filter(d => d.diff < 0);\n  else filtered = rawData;\n  createMarkers(filtered);\n}\n\n// Stats\nconst youthCount = rawData.filter(d => d.diff > 0).length;\nconst elderlyCount = rawData.filter(d => d.diff < 0).length;\nconst topYouth = [...rawData].sort((a,b) => b.diff - a.diff)[0];\nconst topElderly = [...rawData].sort((a,b) => a.diff - b.diff)[0];\n\ndocument.getElementById('st-regions').textContent = rawData.length + '\uac1c';\ndocument.getElementById('st-youth').textContent = youthCount + '\uac1c';\ndocument.getElementById('st-elderly').textContent = elderlyCount + '\uac1c';\ndocument.getElementById('st-top-youth').textContent = `${topYouth.region} (+${topYouth.diff}%p)`;\ndocument.getElementById('st-top-elderly').textContent = `${topElderly.region} (${topElderly.diff}%p)`;\n\n// Initial render\ncreateMarkers(rawData);\n<\/script>\n</body>\n</html>\n"
  },

    html: "<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>\uc2dc\uad70\uad6c\ubcc4 1\uc778\uac00\uad6c \uccad\ub144\u00b7\ub178\ub144 \ube44\uc728 \ubc84\ube14\uc9c0\ub3c4 (2024)</title>\n<link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css\"/>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js\"><\/script>\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #0f1117; color: #e0e0e0; }\n  #header {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;\n    background: rgba(15,17,23,0.95); backdrop-filter: blur(8px);\n    padding: 12px 20px; border-bottom: 1px solid #2a2d3a;\n    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;\n  }\n  #header h1 { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }\n  #header span { font-size: 12px; color: #888; }\n  #map { position: fixed; top: 56px; left: 0; right: 320px; bottom: 0; }\n  #sidebar {\n    position: fixed; top: 56px; right: 0; width: 320px; bottom: 0;\n    background: #13151f; border-left: 1px solid #2a2d3a;\n    overflow-y: auto; padding: 16px;\n    display: flex; flex-direction: column; gap: 16px;\n  }\n  .panel { background: #1a1d2e; border-radius: 10px; padding: 14px; border: 1px solid #2a2d3a; }\n  .panel-title { font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }\n  /* \uc0c9\uc0c1 \ubc94\ub840 */\n  .legend-bar {\n    height: 16px; border-radius: 8px;\n    background: linear-gradient(to right, #1a6fa8, #3a9fd4, #e8e8e8, #e87c5a, #c0392b);\n    margin: 6px 0;\n  }\n  .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #888; }\n  /* \ud06c\uae30 \ubc94\ub840 */\n  .size-legend { display: flex; align-items: flex-end; gap: 10px; padding: 6px 0; }\n  .size-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }\n  .size-circle { background: rgba(180,180,180,0.3); border: 1px solid #666; border-radius: 50%; }\n  .size-label { font-size: 10px; color: #888; }\n  /* \ud544\ud130 */\n  select, input[type=range] { background: #0f1117; color: #e0e0e0; border: 1px solid #3a3d4a; border-radius: 6px; padding: 6px 8px; font-size: 12px; width: 100%; }\n  input[type=range] { padding: 0; cursor: pointer; accent-color: #4a9fd4; }\n  .filter-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }\n  .filter-label { font-size: 11px; color: #aaa; }\n  /* \ud1b5\uacc4 */\n  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }\n  .stat-box { background: #0f1117; border-radius: 8px; padding: 10px; text-align: center; }\n  .stat-num { font-size: 20px; font-weight: 700; color: #4a9fd4; }\n  .stat-label { font-size: 10px; color: #888; margin-top: 2px; }\n  /* \uc0c1\uc704 \ubaa9\ub85d */\n  .rank-list { list-style: none; }\n  .rank-item {\n    display: flex; align-items: center; gap: 8px;\n    padding: 6px 0; border-bottom: 1px solid #2a2d3a; cursor: pointer;\n    transition: background 0.15s;\n  }\n  .rank-item:hover { background: #1f2235; border-radius: 6px; padding: 6px 6px; }\n  .rank-num { font-size: 11px; color: #666; width: 18px; text-align: right; flex-shrink: 0; }\n  .rank-name { font-size: 12px; flex: 1; }\n  .rank-sido { font-size: 10px; color: #666; }\n  .rank-val { font-size: 12px; font-weight: 700; flex-shrink: 0; }\n  .badge { display: inline-block; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: 700; }\n  .badge-youth { background: #c0392b22; color: #e87c5a; border: 1px solid #c0392b44; }\n  .badge-elderly { background: #1a6fa822; color: #3a9fd4; border: 1px solid #1a6fa844; }\n  /* \ud0ed */\n  .tabs { display: flex; gap: 4px; margin-bottom: 8px; }\n  .tab { flex: 1; padding: 6px; text-align: center; font-size: 11px; cursor: pointer;\n    background: #0f1117; border-radius: 6px; border: 1px solid #2a2d3a; color: #888; transition: all 0.15s; }\n  .tab.active { background: #1a3a5c; color: #4a9fd4; border-color: #1a6fa8; }\n  /* \ud31d\uc5c5 \ucee4\uc2a4\ud140 */\n  .leaflet-popup-content-wrapper { background: #1a1d2e; border: 1px solid #3a3d5a; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }\n  .leaflet-popup-tip { background: #1a1d2e; }\n  .leaflet-popup-content { color: #e0e0e0; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 0; }\n  .popup-inner { padding: 4px; }\n  .popup-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #2a2d3a; }\n  .popup-sido { font-size: 11px; color: #888; margin-bottom: 2px; }\n  .popup-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #1a1d2e22; }\n  .popup-key { font-size: 12px; color: #aaa; }\n  .popup-val { font-size: 13px; font-weight: 600; }\n  .popup-bar-wrap { margin: 10px 0 4px; }\n  .popup-bar-label { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 4px; }\n  .popup-bar-bg { height: 8px; background: #0f1117; border-radius: 4px; overflow: hidden; position: relative; }\n  .popup-bar-youth { height: 100%; border-radius: 4px; background: #c0392b; transition: width 0.3s; }\n  .popup-bar-elderly { height: 8px; background: #1a6fa8; border-radius: 4px; margin-top: 4px; }\n  .diff-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 700; margin-top: 8px; }\n  /* \ub85c\ub529 */\n  #loading { position: fixed; inset: 0; background: #0f1117; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 12px; }\n  #loading p { color: #888; font-size: 13px; }\n  .spinner { width: 36px; height: 36px; border: 3px solid #2a2d3a; border-top-color: #4a9fd4; border-radius: 50%; animation: spin 0.8s linear infinite; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n  /* \ubc18\uc751\ud615 */\n  @media (max-width: 768px) {\n    #map { right: 0; bottom: 280px; }\n    #sidebar { top: auto; right: 0; left: 0; width: 100%; height: 280px; border-left: none; border-top: 1px solid #2a2d3a; }\n  }\n  .leaflet-control-zoom a { background: #1a1d2e !important; color: #e0e0e0 !important; border-color: #3a3d5a !important; }\n  .leaflet-control-zoom a:hover { background: #2a2d4a !important; }\n  #reset-btn { background: #1a1d2e; border: 1px solid #3a3d5a; color: #aaa; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: all 0.15s; }\n  #reset-btn:hover { background: #2a2d4a; color: #fff; }\n</style>\n</head>\n<body>\n<div id=\"loading\"><div class=\"spinner\"></div><p>\uc9c0\ub3c4 \ub370\uc774\ud130 \ubd88\ub7ec\uc624\ub294 \uc911...</p></div>\n\n<div id=\"header\">\n  <h1>\ud83d\uddfa\ufe0f \uc2dc\uad70\uad6c\ubcc4 1\uc778\uac00\uad6c \uccad\ub144\u00b7\ub178\ub144 \ube44\uc728 \ubc84\ube14\uc9c0\ub3c4</h1>\n  <span>\ud1b5\uacc4\uccad 2024\ub144 \uae30\uc900 | 248\uac1c \uc2dc\uad70\uad6c</span>\n  <button id=\"reset-btn\" onclick=\"resetView()\">\uc804\uad6d \ubcf4\uae30</button>\n</div>\n\n<div id=\"map\"></div>\n\n<div id=\"sidebar\">\n  <!-- \uc0c9\uc0c1 \ubc94\ub840 -->\n  <div class=\"panel\">\n    <div class=\"panel-title\">\uc0c9\uc0c1 \u2014 \uccad\ub144\u00b7\ub178\ub144 \ube44\uc728 \ucc28\uc774 (\uccad\ub144 \u2212 \ub178\ub144)</div>\n    <div class=\"legend-bar\"></div>\n    <div class=\"legend-labels\">\n      <span>\ub178\ub144 \uc6b0\uc138<br>\u221257%</span>\n      <span style=\"text-align:center\">\uade0\ud615<br>0%</span>\n      <span style=\"text-align:right\">\uccad\ub144 \uc6b0\uc138<br>+53%</span>\n    </div>\n    <div style=\"margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;\">\n      <span class=\"badge badge-youth\">\u igungu\":\"\ud568\uc591\uad70\",\"total\":7316,\"youth\":627,\"elderly\":4225,\"youth_pct\":8.6,\"elderly_pct\":57.8,\"diff\":-49.2,\"lat\":35.5205,\"lng\":127.7248},{\"full_name\":\"\uacbd\uc0c1\ub0a8\ub3c4 \uac70\ucc3d\uad70\",\"sido\":\"\uacbd\uc0c1\ub0a8\ub3c4\",\"sigungu\":\"\uac70\ucc3d\uad70\",\"total\":10789,\"youth\":1467,\"elderly\":5362,\"youth_pct\":13.6,\"elderly_pct\":49.7,\"diff\":-36.1,\"lat\":35.6868,\"lng\":127.9099},{\"full_name\":\"\uacbd\uc0c1\ub0a8\ub3c4 \ud569\ucc9c\uad70\",\"sido\":\"\uacbd\uc0c1\ub0a8\ub3c4\",\"sigungu\":\"\ud569\ucc9c\uad70\",\"total\":9136,\"youth\":584,\"elderly\":5749,\"youth_pct\":6.4,\"elderly_pct\":62.9,\"diff\":-56.5,\"lat\":35.5666,\"lng\":128.1654},{\"full_name\":\"\uc81c\uc8fc\ud2b9\ubcc4\uc790\uce58\ub3c4 \uc81c\uc8fc\uc2dc\",\"sido\":\"\uc81c\uc8fc\ud2b9\ubcc4\uc790\uce58\ub3c4\",\"sigungu\":\"\uc81c\uc8fc\uc2dc\",\"total\":68668,\"youth\":20394,\"elderly\":16897,\"youth_pct\":29.7,\"elderly_pct\":24.6,\"diff\":5.1,\"lat\":33.4996,\"lng\":126.5312},{\"full_name\":\"\uc81c\uc8fc\ud2b9\ubcc4\uc790\uce58\ub3c4 \uc11c\uadc0\ud3ec\uc2dc\",\"sido\":\"\uc81c\uc8fc\ud2b9\ubcc4\uc790\uce58\ub3c4\",\"sigungu\":\"\uc11c\uadc0\ud3ec\uc2dc\",\"total\":26312,\"youth\":5221,\"elderly\":8272,\"youth_pct\":19.8,\"elderly_pct\":31.4,\"diff\":-11.6,\"lat\":33.2541,\"lng\":126.56}]\n;\n\nlet map, circles = [], currentData = [...RAW_DATA], activeTab = 'youth';\n\nfunction getColor(diff) {\n  // diff \ubc94\uc704: -57 ~ +53\n  const t = Math.max(-1, Math.min(1, diff / 55));\n  if (t >= 0) {\n    // 0 ~ 1: \ud68c\uc0c9 -> \ube68\uac15\n    const r = Math.round(232 + (232-232)*t); // stays\n    const g = Math.round(232 - (232-60)*t);\n    const b = Math.round(232 - (232-60)*t);\n    const base = [232, 232, 232], target = [200, 57, 43];\n    const mix = (a,b,t) => Math.round(a + (b-a)*t);\n    return `rgb(${mix(232,200,t)},${mix(232,57,t)},${mix(232,43,t)})`;\n  } else {\n    const t2 = -t;\n    return `rgb(${Math.round(232-206*t2)},${Math.round(232-120*t2)},${Math.round(232-20*t2)})`;\n  }\n}\n\nfunction getRadius(total) {\n  // \ub85c\uadf8 \uc2a4\ucf00\uc77c\ub85c \uc6d0 \ud06c\uae30 \uacb0\uc815\n  const minR = 5, maxR = 30;\n  const logMin = Math.log(2000), logMax = Math.log(190000);\n  const logVal = Math.log(Math.max(2000, total));\n  return minR + (maxR - minR) * (logVal - logMin) / (logMax - logMin);\n}\n\nfunction fmt(n) { return n.toLocaleString('ko-KR'); }\n\nfunction createPopup(d) {\n  const diffColor = d.diff >= 0 ? '#e87c5a' : '#3a9fd4';\n  const diffText = d.diff >= 0 ? `\uccad\ub144\uc774 ${d.diff}%p \ub9ce\uc74c` : `\ub178\ub144\uc774 ${Math.abs(d.diff)}%p \ub9ce\uc74c`;\n  return `<div class=\"popup-inner\">\n    <div class=\"popup-sido\">${d.sido}</div>\n    <div class=\"popup-title\">${d.sigungu}</div>\n    <div class=\"popup-row\"><span class=\"popup-key\">1\uc778\uac00\uad6c \ucd1d\uc218</span><span class=\"popup-val\">${fmt(d.total)}\uac00\uad6c</span></div>\n    <div class=\"popup-row\"><span class=\"popup-key\">\uccad\ub144(20-39\uc138)</span><span class=\"popup-val\" style=\"color:#e87c5a\">${fmt(d.youth)}\uac00\uad6c (${d.youth_pct}%)</span></div>\n    <div class=\"popup-row\"><span class=\"popup-key\">\ub178\ub144(65\uc138\u2191)</span><span class=\"popup-val\" style=\"color:#3a9fd4\">${fmt(d.elderly)}\uac00\uad6c (${d.elderly_pct}%)</span></div>\n    <div class=\"popup-bar-wrap\">\n      <div class=\"popup-bar-label\"><span>\uccad\ub144 \ube44\uc728 ${d.youth_pct}%</span><span>${d.elderly_pct}% \ub178\ub144 \ube44\uc728</span></div>\n      <div class=\"popup-bar-bg\"><div class=\"popup-bar-youth\" style=\"width:${Math.min(100,d.youth_pct)}%\"></div></div>\n      <div class=\"popup-bar-bg\" style=\"margin-top:4px\"><div class=\"popup-bar-elderly\" style=\"width:${Math.min(100,d.elderly_pct)}%\"></div></div>\n    </div>\n    <div><span class=\"diff-badge\" style=\"background:${diffColor}22;color:${diffColor};border:1px solid ${diffColor}44\">\n      ${diffText}\n    </span></div>\n  </div>`;\n}\n\nfunction drawCircles(data) {\n  circles.forEach(c => map.removeLayer(c));\n  circles = [];\n  data.forEach(d => {\n    const c = L.circleMarker([d.lat, d.lng], {\n      radius: getRadius(d.total),\n      fillColor: getColor(d.diff),\n      fillOpacity: 0.75,\n      color: 'rgba(255,255,255,0.3)',\n      weight: 0.8\n    }).addTo(map);\n    c.bindPopup(createPopup(d), { maxWidth: 260, className: 'custom-popup' });\n    c.on('mouseover', function() { this.openPopup(); });\n    circles.push(c);\n  });\n}\n\nfunction updateStats(data) {\n  const total = data.reduce((s, d) => s + d.total, 0);\n  const youthDom = data.filter(d => d.diff > 0).length;\n  const elderlyDom = data.filter(d => d.diff < 0).length;\n  document.getElementById('stat-count').textContent = data.length;\n  document.getElementById('stat-total').textContent = (total/10000).toFixed(0) + '\ub9cc';\n  document.getElementById('stat-youth-dom').textContent = youthDom;\n  document.getElementById('stat-elderly-dom').textContent = elderlyDom;\n}\n\nfunction updateRanking(data) {\n  const sorted = [...data].sort((a, b) => \n    activeTab === 'youth' ? b.diff - a.diff : a.diff - b.diff\n  );\n  const top10 = sorted.slice(0, 10);\n  const list = document.getElementById('rank-list');\n  list.innerHTML = top10.map((d, i) => {\n    const diffColor = d.diff >= 0 ? '#e87c5a' : '#3a9fd4';\n    const sign = d.diff >= 0 ? '+' : '';\n    return `<li class=\"rank-item\" onclick=\"flyTo(${d.lat},${d.lng})\">\n      <span class=\"rank-num\">${i+1}</span>\n      <div style=\"flex:1\"><div class=\"rank-name\">${d.sigungu}</div><div class=\"rank-sido\">${d.sido}</div></div>\n      <span class=\"rank-val\" style=\"color:${diffColor}\">${sign}${d.diff}%p</span>\n    </li>`;\n  }).join('');\n}\n\nfunction applyFilters() {\n  const sido = document.getElementById('sido-filter').value;\n  const minTotal = parseInt(document.getElementById('min-total').value);\n  currentData = RAW_DATA.filter(d => {\n    if (sido && d.sido !== sido) return false;\n    if (d.total < minTotal) return false;\n    return true;\n  });\n  drawCircles(currentData);\n  updateStats(currentData);\n  updateRanking(currentData);\n}\n\nfunction updateSlider(el) {\n  document.getElementById('min-total-val').textContent = parseInt(el.value).toLocaleString('ko-KR');\n  applyFilters();\n}\n\nfunction setTab(tab, el) {\n  activeTab = tab;\n  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));\n  el.classList.add('active');\n  updateRanking(currentData);\n}\n\nfunction flyTo(lat, lng) {\n  map.flyTo([lat, lng], 11, { duration: 1 });\n}\n\nfunction resetView() {\n  map.flyTo([36.5, 127.8], 7, { duration: 1.2 });\n}\n\nfunction initSidoFilter() {\n  const sidos = [...new Set(RAW_DATA.map(d => d.sido))].sort();\n  const sel = document.getElementById('sido-filter');\n  sidos.forEach(s => {\n    const opt = document.createElement('option');\n    opt.value = s; opt.textContent = s;\n    sel.appendChild(opt);\n  });\n}\n\ndocument.addEventListener('DOMContentLoaded', () => {\n  map = L.map('map', {\n    center: [36.5, 127.8],\n    zoom: 7,\n    zoomControl: true,\n    preferCanvas: true\n  });\n\n  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {\n    attribution: '\u00a9 OpenStreetMap contributors \u00a9 CARTO',\n    subdomains: 'abcd', maxZoom: 18\n  }).addTo(map);\n\n  initSidoFilter();\n  drawCircles(currentData);\n  updateStats(currentData);\n  updateRanking(currentData);\n\n  document.getElementById('loading').style.display = 'none';\n});\n<\/script>\n</body>\n</html>\n"

/ amber\n    [0.5,  [148,163,184]], // slate (neutral)\n    [0.75, [56,189,248]],  // sky\n    [1.0,  [99,102,241]]   // indigo\n  ];\n  let s0 = stops[0], s1 = stops[stops.length-1];\n  for (let i = 0; i < stops.length-1; i++) {\n    if (t >= stops[i][0] && t <= stops[i+1][0]) { s0 = stops[i]; s1 = stops[i+1]; break; }\n  }\n  const p = (t - s0[0]) / (s1[0] - s0[0]);\n  const r = Math.round(s0[1][0] + p*(s1[1][0]-s0[1][0]));\n  const g = Math.round(s0[1][1] + p*(s1[1][1]-s0[1][1]));\n  const b = Math.round(s0[1][2] + p*(s1[1][2]-s0[1][2]));\n  return `rgb(${r},${g},${b})`;\n}\n\nfunction totalToRadius(total) {\n  return Math.max(5, Math.sqrt(total / 300));\n}\n\n// \u2500\u2500\u2500 BUBBLES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet allMarkers = [];\nlet currentFilter = 'all';\n\nfunction createMarkers(filter) {\n  allMarkers.forEach(m => map.removeLayer(m));\n  allMarkers = [];\n\n  const filtered = processedData.filter(d => {\n    if (filter === 'youth') return d.diff > 5;\n    if (filter === 'elder') return d.diff < -5;\n    return true;\n  });\n\n  filtered.forEach(d => {\n    const color = diffToColor(d.diff);\n    const radius = totalToRadius(d.total);\n    const alpha = Math.abs(d.diff) < 3 ? 0.55 : 0.78;\n\n    const marker = L.circleMarker([d.lat, d.lng], {\n      radius,\n      fillColor: color,\n      fillOpacity: alpha,\n      color: color,\n      weight: 1.5,\n      opacity: 0.9\n    });\n\n    const diffSign = d.diff > 0 ? '+' : '';\n    const diffColor = d.diff > 0 ? '#818cf8' : d.diff < 0 ? '#fb923c' : '#94a3b8';\n    const yPct = Math.min(d.youth_pct, 100);\n    const ePct = Math.min(d.elder_pct, 100);\n    const barMax = Math.max(d.youth_pct, d.elder_pct, 1);\n    const yWidth = (d.youth_pct / barMax * 50).toFixed(1);\n    const eWidth = (d.elder_pct / barMax * 50).toFixed(1);\n\n    marker.bindPopup(`\n      <div class=\"popup-inner\">\n        <div class=\"popup-title\">${d.city ? d.city + ' ' : ''}${d.region}</div>\n        <div class=\"popup-row\">\n          <span class=\"popup-key\">1\uc778\uac00\uad6c \ucd1d\uc218</span>\n          <span class=\"popup-val\">${d.total.toLocaleString()}\uac00\uad6c</span>\n        </div>\n        <div class=\"popup-row\">\n          <span class=\"popup-key\">\uccad\ub144 \ube44\uc728 (20~39\uc138)</span>\n          <span class=\"popup-val\" style=\"color:#818cf8\">${d.youth_pct}%</span>\n        </div>\n        <div class=\"popup-row\">\n          <span class=\"popup-key\">\ub178\ub144 \ube44\uc728 (65\uc138\u2191)</span>\n          <span class=\"popup-val\" style=\"color:#fb923c\">${d.elder_pct}%</span>\n        </div>\n        <div class=\"popup-row\">\n          <span class=\"popup-key\">\uccad\ub144-\ub178\ub144 \ucc28\uc774</span>\n          <span class=\"popup-val\" style=\"color:${diffColor}\">${diffSign}${d.diff}%p</span>\n        </div>\n        <div class=\"popup-bar-wrap\">\n          <div class=\"popup-bar-label\">\uad6c\uc131 \ube44\uad50</div>\n          <div class=\"popup-bar-track\">\n            <div class=\"popup-bar-youth\" style=\"width:${yWidth}%\"></div>\n            <div class=\"popup-bar-elder\" style=\"width:${eWidth}%\"></div>\n          </div>\n          <div class=\"popup-bar-labels\">\n            <span class=\"y\">\uccad\ub144 ${d.youth_pct}%</span>\n            <span class=\"e\">\ub178\ub144 ${d.elder_pct}%</span>\n          </div>\n        </div>\n      </div>\n    `, { maxWidth: 280, className: '' });\n\n    marker.addTo(map);\n    allMarkers.push(marker);\n  });\n}\n\n// \u2500\u2500\u2500 FILTER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction setFilter(f) {\n  currentFilter = f;\n  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','active-elder'));\n  const btn = document.getElementById(`btn-${f}`);\n  if (f === 'elder') btn.classList.add('active-elder');\n  else btn.classList.add('active');\n  createMarkers(f);\n}\n\n// \u2500\u2500\u2500 STATS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst youthCount = processedData.filter(d => d.diff > 5).length;\nconst elderCount = processedData.filter(d => d.diff < -5).length;\nconst yMax = processedData.reduce((a,b) => b.youth_pct > a.youth_pct ? b : a);\nconst eMax = processedData.reduce((a,b) => b.elder_pct > a.elder_pct ? b : a);\n\ndocument.getElementById('s-count').textContent = processedData.length + '\uac1c';\ndocument.getElementById('s-youth').textContent = youthCount + '\uac1c';\ndocument.getElementById('s-elder').textContent = elderCount + '\uac1c';\ndocument.getElementById('s-ymax').textContent = `${yMax.region} ${yMax.youth_pct}%`;\ndocument.getElementById('s-emax').textContent = `${eMax.region} ${eMax.elder_pct}%`;\n\n// \u2500\u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ncreateMarkers('all');\n<\/script>\n</body>\n</html>\n"

,\"youth_pct\":15.3,\"elderly_pct\":44.9,\"diff\":-29.6,\"lat\":35.5207,\"lng\":127.725},\n  {\"name\":\"\uac70\ucc3d\uad70\",\"total\":12143,\"youth\":2239,\"elderly\":5039,\"youth_pct\":18.4,\"elderly_pct\":41.5,\"diff\":-23.1,\"lat\":35.6867,\"lng\":127.9098},\n  {\"name\":\"\ud569\ucc9c\uad70\",\"total\":10105,\"youth\":1381,\"elderly\":4795,\"youth_pct\":13.7,\"elderly_pct\":47.5,\"diff\":-33.8,\"lat\":35.5664,\"lng\":128.1656},\n  {\"name\":\"\uc81c\uc8fc\uc2dc\",\"total\":73434,\"youth\":21768,\"elderly\":18744,\"youth_pct\":29.6,\"elderly_pct\":25.5,\"diff\":4.1,\"lat\":33.4996,\"lng\":126.5312},\n  {\"name\":\"\uc11c\uadc0\ud3ec\uc2dc\",\"total\":32497,\"youth\":7748,\"elderly\":10270,\"youth_pct\":23.8,\"elderly_pct\":31.6,\"diff\":-7.8,\"lat\":33.2541,\"lng\":126.56}\n];\n\n// Color scale: negative = red (elderly dominant), zero = white, positive = blue (youth dominant)\nfunction diffToColor(diff) {\n  const clamped = Math.max(-35, Math.min(35, diff));\n  if (clamped >= 0) {\n    // White to deep blue\n    const t = clamped / 35;\n    const r = Math.round(255 * (1 - t * 0.87));\n    const g = Math.round(255 * (1 - t * 0.72));\n    const b = Math.round(255 * (1 - t * 0.05));\n    return `rgb(${r},${g},${b})`;\n  } else {\n    // White to deep red\n    const t = (-clamped) / 35;\n    const r = Math.round(255 * (1 - t * 0.05));\n    const g = Math.round(255 * (1 - t * 0.8));\n    const b = Math.round(255 * (1 - t * 0.87));\n    return `rgb(${r},${g},${b})`;\n  }\n}\n\nfunction bubbleRadius(total, zoom) {\n  // Logarithmic scale; zoom-aware scaling\n  const minV = 2000, maxV = 220000;\n  const logT = Math.log(Math.max(total, minV));\n  const logMin = Math.log(minV);\n  const logMax = Math.log(maxV);\n  const t = (logT - logMin) / (logMax - logMin);\n  // Base: 2\u201310px; grows slightly when zoomed in\n  const zoomScale = Math.max(0.6, (zoom - 5) * 0.35);\n  return (2 + t * 10) * zoomScale;\n}\n\nfunction formatNum(n) {\n  return n.toLocaleString('ko-KR');\n}\n\n// Init map\nconst map = L.map('map', {\n  center: [36.5, 127.8],\n  zoom: 7,\n  zoomControl: true,\n  attributionControl: true\n});\n\n// Dark tile layer\nL.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {\n  attribution: '&copy; <a href=\"https://www.openstreetmap.org/copyright\">OpenStreetMap</a> &copy; <a href=\"https://carto.com/\">CARTO</a>',\n  subdomains: 'abcd',\n  maxZoom: 19\n}).addTo(map);\n\n// Draw bubbles\nconst circles = [];\nDATA.forEach(d => {\n  const color = diffToColor(d.diff);\n\n  const circle = L.circleMarker([d.lat, d.lng], {\n    radius: bubbleRadius(d.total, map.getZoom()),\n    fillColor: color,\n    fillOpacity: 0.60,\n    color: 'rgba(255,255,255,0.35)',\n    weight: 0.8,\n  }).addTo(map);\n  circles.push({ circle, d });\n\n  // Update radius on zoom\n  map.on('zoomend', () => {\n    circle.setRadius(bubbleRadius(d.total, map.getZoom()));\n  });\n\n  const popupHtml = `\n    <div class=\"popup-name\">${d.name}</div>\n    <div class=\"popup-grid\">\n      <div class=\"popup-stat\">\n        <div class=\"popup-stat-label\">1\uc778\uac00\uad6c \ucd1d\uc218</div>\n        <div class=\"popup-stat-value\">${formatNum(d.total)}\uac00\uad6c</div>\n      </div>\n      <div class=\"popup-stat\">\n        <div class=\"popup-stat-label\">\uccad\ub144\u2013\ub178\ub144 \ucc28\uc774</div>\n        <div class=\"popup-stat-value\" style=\"color:${d.diff>=0?'#90caf9':'#ef9a9a'}\">${d.diff>=0?'+':''}${d.diff}%p</div>\n      </div>\n      <div class=\"popup-stat\">\n        <div class=\"popup-stat-label\">\ud83d\udfe6 \uccad\ub144 (20\u201339)</div>\n        <div class=\"popup-stat-value\" style=\"color:#90caf9\">${formatNum(d.youth)}\uba85<br><span style=\"font-size:0.75rem;color:#7986cb\">${d.youth_pct}%</span></div>\n      </div>\n      <div class=\"popup-stat\">\n        <div class=\"popup-stat-label\">\ud83d\udfe5 \ub178\ub144 (65+)</div>\n        <div class=\"popup-stat-value\" style=\"color:#ef9a9a\">${formatNum(d.elderly)}\uba85<br><span style=\"font-size:0.75rem;color:#7986cb\">${d.elderly_pct}%</span></div>\n      </div>\n    </div>\n    <div class=\"popup-bar\" style=\"margin-top:10px;\">\n      <div class=\"popup-bar-youth\" style=\"width:${d.youth_pct}%\"></div>\n      <div class=\"popup-bar-middle\"></div>\n      <div class=\"popup-bar-elderly\" style=\"width:${d.elderly_pct}%\"></div>\n    </div>\n    <div class=\"popup-bar-labels\">\n      <span>\ud83d\udfe6 \uccad\ub144 ${d.youth_pct}%</span>\n      <span>\ud83d\udfe5 \ub178\ub144 ${d.elderly_pct}%</span>\n    </div>\n  `;\n\n  circle.bindPopup(popupHtml, {\n    maxWidth: 280,\n    className: 'dark-popup'\n  });\n\n  circle.on('mouseover', () => {\n    circle.setStyle({ weight: 2, color: '#fff', fillOpacity: 0.90 });\n    circle.bringToFront();\n    // Update info panel\n    const panel = document.getElementById('info-panel');\n    document.getElementById('panel-name').textContent = d.name;\n    document.getElementById('panel-total').textContent = formatNum(d.total) + '\uac00\uad6c';\n    document.getElementById('panel-youth').textContent = `${formatNum(d.youth)}\uba85 (${d.youth_pct}%)`;\n    document.getElementById('panel-elderly').textContent = `${formatNum(d.elderly)}\uba85 (${d.elderly_pct}%)`;\n    document.getElementById('panel-diff').textContent = `${d.diff >= 0 ? '+' : ''}${d.diff}%p`;\n    const badge = document.getElementById('panel-badge');\n    if (d.diff > 5) {\n      badge.className = 'diff-badge youth';\n      badge.textContent = '\ud83d\udd35 \uccad\ub144 1\uc778\uac00\uad6c \uc6b0\uc138 \uc9c0\uc5ed';\n    } else if (d.diff < -5) {\n      badge.className = 'diff-badge elderly';\n      badge.textContent = '\ud83d\udd34 \ub178\ub144 1\uc778\uac00\uad6c \uc6b0\uc138 \uc9c0\uc5ed';\n    } else {\n      badge.className = 'diff-badge balanced';\n      badge.textContent = '\u26aa \uccad\ub144\u00b7\ub178\ub144 \uade0\ud615 \uc9c0\uc5ed';\n    }\n    panel.classList.add('active');\n  });\n\n  circle.on('mouseout', () => {\n    circle.setStyle({ weight: 0.8, color: 'rgba(255,255,255,0.35)', fillOpacity: 0.60 });\n  });\n});\n<\/script>\n</body>\n</html>\n"
  }

// ── State ──────────────────────────────────────────
let pages = [];
let currentIdx = -1;

// ── Init ───────────────────────────────────────────
INITIAL_PAGES.forEach(p => pages.push(p));
renderSidebar();
updateCount();

// ── Sidebar rendering ──────────────────────────────
function renderSidebar() {
  const list = document.getElementById('navList');
  list.innerHTML = '';
  pages.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === currentIdx ? ' active' : '');
    btn.dataset.idx = i;
    btn.innerHTML = `
      <button class="btn-delete" title="삭제" onclick="deletePage(event, ${i})">✕</button>
      <div class="nb-row"><span class="nb-dot"></span><span class="nb-num">${String(i+1).padStart(2,'0')}</span></div>
      <div class="nb-title">${escHtml(p.title)}</div>
      <div class="nb-sub">${escHtml(p.sub)}</div>
      <div class="nb-file">${escHtml(p.file)}</div>
    `;
    btn.addEventListener('click', () => loadPage(i));
    list.appendChild(btn);
  });
}

function updateCount() {
  document.getElementById('totalCount').textContent = pages.length;
}

// ── Load page ─────────────────────────────────────
function loadPage(idx) {
  currentIdx = idx;
  renderSidebar();

  document.getElementById('emptyState').style.display = 'none';
  const wrapper = document.getElementById('previewWrapper');
  wrapper.style.display = 'flex';

  document.getElementById('tNum').textContent   = String(idx+1).padStart(2,'0');
  document.getElementById('tTitle').textContent = pages[idx].title;
  document.getElementById('loadingOverlay').classList.remove('hidden');

  const frame = document.getElementById('previewFrame');
  frame.onload = () => setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 150);
  frame.srcdoc = pages[idx].html;
}

// ── Delete page ───────────────────────────────────
function deletePage(e, idx) {
  e.stopPropagation();
  const removed = pages.splice(idx, 1)[0];

  if (currentIdx === idx) {
    // 삭제한 게 현재 보던 것
    currentIdx = -1;
    if (pages.length > 0) {
      loadPage(Math.min(idx, pages.length - 1));
      return;
    } else {
      document.getElementById('emptyState').style.display = '';
      document.getElementById('previewWrapper').style.display = 'none';
    }
  } else if (currentIdx > idx) {
    currentIdx--;
  }

  renderSidebar();
  updateCount();
  showToast(`"${removed.title}" 삭제됨`, 'error');
}

// ── Add files ─────────────────────────────────────
function triggerFileInput() {
  document.getElementById('fileInput').click();
}

function handleFileInput(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  readFiles(files);
  input.value = ''; // reset so same file can be re-added
}

function readFiles(files) {
  const htmlFiles = files.filter(f => f.name.endsWith('.html') || f.type === 'text/html');
  if (!htmlFiles.length) { showToast('HTML 파일만 추가할 수 있습니다', 'error'); return; }

  let loaded = 0;
  htmlFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const html  = e.target.result;
      const title = extractTitle(html) || file.name.replace(/\.html$/i, '');
      pages.push({ file: file.name, num: '', title, sub: file.name, html });
      loaded++;
      if (loaded === htmlFiles.length) {
        renderSidebar();
        updateCount();
        // 자동으로 마지막 추가된 파일 선택
        loadPage(pages.length - 1);
        showToast(`${loaded}개 파일 추가됨 ✓`, 'success');
      }
    };
    reader.readAsText(file, 'utf-8');
  });
}

function extractTitle(html) {
  const m = html.match(/<title[^>]*>([^<]+)<\/title>/i);
  return m ? m[1].trim() : null;
}

// ── Drag & Drop (전체 창) ──────────────────────────
let dragCounter = 0;
document.addEventListener('dragenter', e => {
  if ([...e.dataTransfer.types].includes('Files')) {
    dragCounter++;
    document.getElementById('dropOverlay').classList.add('visible');
  }
});
document.addEventListener('dragleave', () => {
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; document.getElementById('dropOverlay').classList.remove('visible'); }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  document.getElementById('dropOverlay').classList.remove('visible');
  readFiles(Array.from(e.dataTransfer.files));
});

// ── Sidebar drop zone ──────────────────────────────
function onSidebarDragOver(e) { e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('drag-over'); }
function onSidebarDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onSidebarDrop(e) {
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove('drag-over');
  readFiles(Array.from(e.dataTransfer.files));
}

// ── Toolbar actions ────────────────────────────────
function openNewTab() {
  if (currentIdx < 0) return;
  const blob = new Blob([pages[currentIdx].html], { type: 'text/html; charset=utf-8' });
  window.open(URL.createObjectURL(blob), '_blank');
}

function downloadCurrent() {
  if (currentIdx < 0) return;
  const p = pages[currentIdx];
  const blob = new Blob([p.html], { type: 'text/html; charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = p.file; a.click();
}

// ── Toast ──────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Utils ──────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
